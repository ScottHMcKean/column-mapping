resources:
  jobs:
    column_mapping_setup_vector_search:
      name: column-mapping-setup-vector-search
      max_concurrent_runs: 1
      tasks:
        - task_key: setup
          environment_key: default
          notebook_task:
            notebook_path: ${workspace.root_path}/files/notebooks/01_setup_data_and_vector_search
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              table_prefix: ${var.table_prefix}
              vs_endpoint_name: ${var.vs_endpoint_name}
              vs_index_name: ${var.vs_index_name}
              embedding_model_endpoint: ${var.embedding_model_endpoint}
      environments:
        - environment_key: default
          spec:
            client: "1"

    column_mapping_run_agentic:
      name: column-mapping-run-agentic
      max_concurrent_runs: 1
      tasks:
        - task_key: run
          environment_key: default
          notebook_task:
            notebook_path: ${workspace.root_path}/files/notebooks/02_run_column_mapping_agentic
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              table_prefix: ${var.table_prefix}
              vs_endpoint_name: ${var.vs_endpoint_name}
              vs_index_name: ${var.vs_index_name}
              llm_endpoint: ${var.llm_endpoint}
              top_k: ${var.top_k}
      environments:
        - environment_key: default
          spec:
            client: "1"
