databricks:
  catalog: main
  schema: column_mapping_demo
  table_prefix: silver

tables:
  # Fully qualified names are derived as: ${catalog}.${schema}.${name}
  rules_table_name: governance_standardization_rules
  mappings_table_name: governance_standardization_mappings

vector_search:
  # If empty, the notebooks will prefer an already ONLINE endpoint.
  # If none exist, setup will create `column_mapping_vs_endpoint`.
  endpoint_name: ""
  endpoint_type: STANDARD
  index_name: governance_standardization_mappings_index
  embedding_model_endpoint: databricks-bge-large-en
  delta_sync:
    primary_key: mapping_id
    embedding_source_column: platform_header
    pipeline_type: TRIGGERED

llm:
  # Used by ai_query() inside the mapping notebook
  endpoint: databricks-claude-haiku-4-5

mapping:
  top_k: 5

